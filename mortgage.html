<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortgage Visualizer</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#263347;--border:#334155;--text:#f1f5f9;--text-muted:#94a3b8;--text-dim:#64748b;--accent:#60a5fa;--accent2:#3b82f6;--radius:10px;--shadow:0 4px 24px rgba(0,0,0,.4);--input-bg:#111827}
[data-theme="light"]{--bg:#f1f5f9;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--text:#0f172a;--text-muted:#475569;--text-dim:#94a3b8;--accent:#2563eb;--accent2:#1d4ed8;--shadow:0 4px 24px rgba(0,0,0,.08);--input-bg:#f8fafc}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.2)}
.header-title{font-size:17px;font-weight:700;color:var(--accent);letter-spacing:-.01em}
.header-btns{display:flex;gap:8px;align-items:center}
.theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:background .2s}
.theme-btn:hover{background:var(--border)}
.main{display:flex;min-height:calc(100vh - 53px)}
.left-panel{width:310px;min-width:310px;background:var(--surface);border-right:1px solid var(--border);padding:20px 18px;overflow-y:auto;height:calc(100vh - 53px);position:sticky;top:53px}
.right-panel{flex:1;padding:24px;overflow-y:auto;min-width:0}
.section{margin-bottom:22px}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:5px}
.field-hint{font-size:10px;color:var(--text-dim);margin-top:3px}
input[type="number"],input[type="text"],select{width:100%;background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent)}
input[type="range"]{width:100%;margin-top:5px;accent-color:var(--accent);cursor:pointer}
.field-row{display:flex;gap:8px;align-items:flex-end}
.field-row .field{flex:1;margin-bottom:0}
.toggle-group{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.toggle-btn{flex:1;padding:6px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--text-muted);background:transparent;border:none;transition:all .15s;white-space:nowrap}
.toggle-btn.active{background:var(--accent2);color:#fff}
.toggle-btn:not(.active):hover{background:var(--surface2)}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-btn{padding:10px 22px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover:not(.active){color:var(--text)}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin-bottom:6px}
.card-value{font-size:19px;font-weight:700;color:var(--text);line-height:1.2}
.card-value.highlight{color:var(--accent)}
.card-value.positive{color:#10b981}
.card-value.negative{color:#f43f5e}
.card-sub{font-size:10px;color:var(--text-dim);margin-top:3px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px}
.chart-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.chart-title{font-size:12px;font-weight:600;color:var(--text-muted)}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-scroll-wrap{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;border-radius:4px}
.chart-scroll-wrap canvas{display:block}
#chartA{height:280px;width:100%}
#chartB{height:220px;width:100%}
#chartC{height:220px;width:100%}
#chartOverlay{height:300px;width:100%}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.legend-group-label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-dim);width:100%;margin-top:6px}
.table-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.table-wrapper{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;max-height:440px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--surface2);padding:9px 12px;text-align:right;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);white-space:nowrap}
thead th:first-child{text-align:left}
tbody td{padding:8px 12px;text-align:right;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap}
tbody td:first-child{text-align:left;font-weight:500;color:var(--text-muted)}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child td{border-bottom:none}
.total-col{font-weight:600;color:var(--accent)!important}
.refi-inputs-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px}
.refi-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-muted)}
.btn-outline:hover{background:var(--surface2);color:var(--text)}
#tooltip{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:9999;box-shadow:var(--shadow);min-width:190px}
#tooltip.visible{opacity:1}
.tt-title{font-weight:700;margin-bottom:7px;color:var(--text);font-size:13px}
.tt-row{display:flex;justify-content:space-between;gap:14px;margin-bottom:3px;color:var(--text-muted)}
.tt-row strong{color:var(--text);font-weight:600}
.tt-divider{border-top:1px solid var(--border);margin:6px 0}
.tt-section{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-dim);margin:6px 0 3px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-icon{font-size:48px;margin-bottom:14px}
.empty-text{font-size:15px;line-height:1.6}
.empty-hint{font-size:12px;margin-top:8px}
.panel-toggle{display:none;width:100%;background:none;border:none;color:var(--text);font-size:14px;font-weight:700;padding:0 0 14px;cursor:pointer;text-align:left;align-items:center;justify-content:space-between}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.zoom-bar{border-top:1px solid var(--border);margin-top:8px;padding:8px 2px 2px;display:flex;flex-direction:column;gap:5px}
.zoom-row{display:flex;align-items:center;gap:10px}
.zoom-label{font-size:11px;color:var(--text-muted);white-space:nowrap;min-width:90px}
@media(max-width:820px){
  .main{flex-direction:column}
  .left-panel{width:100%;min-width:unset;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);padding:16px}
  .panel-toggle{display:flex}
  .panel-content{display:none}
  .panel-content.open{display:block;padding-top:12px}
  .right-panel{padding:16px}
  .chart-grid{grid-template-columns:1fr}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .refi-grid{grid-template-columns:1fr}
  #chartB,#chartC{height:200px}
  #chartOverlay{height:260px;width:100%}
}
@media(max-width:480px){.card-value{font-size:16px}.tab-btn{padding:10px 14px;font-size:12px}}
</style>
</head>
<body>
<div id="tooltip"><div class="tt-title" id="tt-title"></div><div id="tt-body"></div></div>
<header class="header">
  <div class="header-title" data-i18n="app-title">Mortgage Visualizer</div>
  <div class="header-btns">
    <button class="theme-btn" id="langBtn" onclick="toggleLang()">中文</button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">Light Mode</button>
  </div>
</header>
<div class="main">
  <div class="left-panel">
    <button class="panel-toggle" onclick="togglePanel()">
      <span data-i18n="params">Parameters</span><span id="panelArrow">&#9660;</span>
    </button>
    <div class="panel-content open" id="panelContent">
      <div class="section">
        <div class="section-title" data-i18n="section-loan">Loan</div>
        <div class="field"><label data-i18n="label-start-month">Start Month</label><input type="text" id="startMonth" data-i18n-ph="ph-start-month" placeholder="YYYY-MM e.g. 2025-03" oninput="update()" onchange="update()"></div>
        <div class="field"><label data-i18n="label-loan-balance">Loan Balance ($)</label><input type="number" id="loanBalance" data-i18n-ph="ph-loan-balance" placeholder="e.g. 450000" min="0" step="1000" oninput="update()"></div>
        <div class="field">
          <label data-i18n="label-apr">Annual Interest Rate (%)</label>
          <input type="number" id="interestRate" placeholder="e.g. 6.5" min="0" max="30" step="0.05" oninput="document.getElementById('rateSlider').value=this.value||0;update()">
          <input type="range" id="rateSlider" min="0" max="15" step="0.05" value="6.5" oninput="document.getElementById('interestRate').value=parseFloat(this.value).toFixed(2);update()">
          <div class="field-hint" data-i18n="hint-apr">Per year (APR)</div>
        </div>
        <div class="field">
          <label data-i18n="label-term">Loan Term</label>
          <div class="toggle-group" id="termGroup">
            <button class="toggle-btn" onclick="setTerm(15)">15yr</button>
            <button class="toggle-btn" onclick="setTerm(20)">20yr</button>
            <button class="toggle-btn" onclick="setTerm(25)">25yr</button>
            <button class="toggle-btn active" onclick="setTerm(30)">30yr</button>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-title" data-i18n="section-costs">Monthly Costs</div>
        <div class="field">
          <label data-i18n="label-tax">Property Tax</label>
          <div class="toggle-group" style="margin-bottom:8px">
            <button class="toggle-btn active" id="taxBtnA" data-i18n="tax-mode-a" onclick="setTaxMode('A')">Annual Amount</button>
            <button class="toggle-btn" id="taxBtnB" data-i18n="tax-mode-b" onclick="setTaxMode('B')">Rate x Value</button>
          </div>
          <div id="taxFieldsA"><input type="number" id="propertyTaxAnnual" data-i18n-ph="ph-tax-annual" placeholder="Annual tax ($) e.g. 6000" min="0" oninput="update()"></div>
          <div id="taxFieldsB" style="display:none">
            <input type="number" id="homeValue" data-i18n-ph="ph-home-value" placeholder="Home value ($)" min="0" oninput="update()" style="margin-bottom:6px">
            <input type="number" id="propertyTaxRate" data-i18n-ph="ph-tax-rate" placeholder="Tax rate (%) e.g. 1.2" min="0" max="10" step="0.01" oninput="update()">
          </div>
        </div>
        <div class="field"><label data-i18n="label-insurance">Home Insurance (annual $)</label><input type="number" id="homeInsuranceAnnual" data-i18n-ph="ph-insurance" placeholder="e.g. 1800" min="0" oninput="update()"></div>
        <div class="field-row">
          <div class="field"><label data-i18n="label-hoa">HOA (mo. $)</label><input type="number" id="hoaMonthly" placeholder="0" min="0" oninput="update()"></div>
          <div class="field"><label data-i18n="label-pmi">PMI (mo. $)</label><input type="number" id="pmiMonthly" placeholder="0" min="0" oninput="update()"></div>
        </div>
        <div class="field"><label data-i18n="label-other">Other (monthly $)</label><input type="number" id="otherMonthly" placeholder="0" min="0" oninput="update()"></div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="tab-bar">
      <button class="tab-btn active" id="tabBtnMortgage" data-i18n="tab-mortgage" onclick="switchTab('mortgage')">Mortgage</button>
      <button class="tab-btn" id="tabBtnRefi" data-i18n="tab-refi" onclick="switchTab('refi')">Refinance</button>
    </div>
    <div id="mortgageTab">
      <div id="output">
        <div class="empty-state"><div class="empty-icon">&#127968;</div><div class="empty-text" data-i18n="empty-base">Enter your loan balance and interest rate to see projections.</div><div class="empty-hint" data-i18n="empty-base-hint">All costs are optional.</div></div>
      </div>
    </div>
    <div id="refiTab" style="display:none">
      <div class="refi-inputs-panel">
        <div class="section-title" data-i18n="section-refi-params">Refinance Parameters</div>
        <div class="refi-grid">
          <div class="field" style="grid-column:1/-1">
            <label data-i18n="label-refi-start">Refinance Start</label>
            <input type="range" id="refiMonthSlider" min="1" max="360" value="12" oninput="updateRefiSliderLabel();updateRefi()">
            <div class="field-hint" id="refiMonthLabel">Month 12</div>
          </div>
          <div class="field">
            <label data-i18n="label-new-apr">New APR (%)</label>
            <input type="number" id="newApr" placeholder="e.g. 5.5" min="0" max="30" step="0.05" oninput="document.getElementById('newAprSlider').value=this.value||0;updateRefi()">
            <input type="range" id="newAprSlider" min="0" max="15" step="0.05" value="5.5" oninput="document.getElementById('newApr').value=parseFloat(this.value).toFixed(2);updateRefi()">
          </div>
          <div class="field">
            <label data-i18n="label-new-term">New Term</label>
            <div class="toggle-group" id="refiTermGroup">
              <button class="toggle-btn" onclick="setRefiTerm(15)">15yr</button>
              <button class="toggle-btn" onclick="setRefiTerm(20)">20yr</button>
              <button class="toggle-btn" onclick="setRefiTerm(25)">25yr</button>
              <button class="toggle-btn active" onclick="setRefiTerm(30)">30yr</button>
            </div>
          </div>
          <div class="field"><label data-i18n="label-closing-cost">Closing Cost (cash $)</label><input type="number" id="closingCost" placeholder="0" min="0" oninput="updateRefi()"></div>
          <div class="field">
            <label data-i18n="label-horizon">Analysis Horizon</label>
            <select id="horizon" onchange="updateRefi()">
              <option value="36" data-i18n="horizon-3y">3 Years</option>
              <option value="60" data-i18n="horizon-5y">5 Years</option>
              <option value="120" selected data-i18n="horizon-10y">10 Years</option>
              <option value="9999" data-i18n="horizon-payoff">To Payoff</option>
            </select>
          </div>
        </div>
      </div>
      <div id="refiOutput">
        <div class="empty-state"><div class="empty-icon">&#128200;</div><div class="empty-text" data-i18n="empty-refi-no-base">Enter base loan details first, then set refinance parameters above.</div></div>
      </div>
    </div>
  </div>
</div>

function setTouch(cv,onPan){
  if(cv._tsH)cv.removeEventListener('touchstart',cv._tsH);
  if(cv._tmH)cv.removeEventListener('touchmove',cv._tmH);
  if(cv._teH)cv.removeEventListener('touchend',cv._teH);
  if(cv._momId){cancelAnimationFrame(cv._momId);cv._momId=null;}
  let sx=null,vx=0,lastT=0;
  cv._tsH=e=>{sx=e.touches[0].clientX;vx=0;lastT=Date.now();if(cv._momId){cancelAnimationFrame(cv._momId);cv._momId=null;}};
  cv._tmH=e=>{if(sx===null)return;const now=Date.now(),dt=Math.max(1,now-lastT),dx=e.touches[0].clientX-sx;if(Math.abs(dx)>4){vx=dx/dt;lastT=now;onPan(dx);sx=e.touches[0].clientX;}};
  cv._teH=()=>{sx=null;let vel=vx*16;const tick=()=>{if(Math.abs(vel)<0.5)return;onPan(vel);vel*=0.92;cv._momId=requestAnimationFrame(tick);};cv._momId=requestAnimationFrame(tick);};
  cv.addEventListener('touchstart',cv._tsH,{passive:true});
  cv.addEventListener('touchmove',cv._tmH,{passive:true});
  cv.addEventListener('touchend',cv._teH,{passive:true});
}
function setPanWheel(cv,getScroll,setScroll,redraw){
  if(cv._whH)cv.removeEventListener('wheel',cv._whH);
  cv._whH=e=>{e.preventDefault();const d=(Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY)*1.5;setScroll(getScroll()+d);redraw();};
  cv.addEventListener('wheel',cv._whH,{passive:false});
  if(cv._mdH)cv.removeEventListener('mousedown',cv._mdH);

  cv.addEventListener('mousedown',cv._mdH);
  cv.style.cursor='grab';
}

// ── Computation ───────────────────────────────────────────────
function computeSchedule(){
  const P=parseFloat(state.loanBalance)||0,APR=parseFloat(state.interestRate)||0;
  if(P<=0)return null;
  const n=state.termYears*12,r=APR/100/12;
  let pPI;if(r===0)pPI=P/n;else{const pw=Math.pow(1+r,n);pPI=P*r*pw/(pw-1);}
  let taxMo;if(state.taxMode==='A')taxMo=(parseFloat(state.propertyTaxAnnual)||0)/12;else taxMo=(parseFloat(state.homeValue)||0)*(parseFloat(state.propertyTaxRate)||0)/100/12;
  const insMo=(parseFloat(state.homeInsuranceAnnual)||0)/12,hoaMo=parseFloat(state.hoaMonthly)||0,pmiMo=parseFloat(state.pmiMonthly)||0,othMo=parseFloat(state.otherMonthly)||0;
  const ss=state.startMonth||(()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`})();
  const[sy,sm]=ss.split('-').map(Number);
  const schedule=[];let bal=P,totInt=0;
  for(let i=0;i<n;i++){
    const mo=sm-1+i,yr=sy+Math.floor(mo/12),mn=(mo%12)+1;
    const interest=bal*r;let principal=pPI-interest;if(principal>bal)principal=bal;bal=Math.max(bal-principal,0);totInt+=interest;
    schedule.push({month:`${yr}-${String(mn).padStart(2,'0')}`,principal,interest,balance:bal,tax:taxMo,insurance:insMo,hoa:hoaMo,pmi:pmiMo,other:othMo,total:principal+interest+taxMo+insMo+hoaMo+pmiMo+othMo});
    if(bal<0.01)break;
  }
  return{schedule,paymentPI:pPI,taxMo,insMo,hoaMo,pmiMo,othMo,totalInterest:totInt};
}
function aggYearly(schedule){
  const out=[];
  for(let y=0;y<Math.ceil(schedule.length/12);y++){
    const ms=schedule.slice(y*12,(y+1)*12),sum=k=>ms.reduce((a,m)=>a+m[k],0);
    const f=ms[0],l=ms[ms.length-1];
    out.push({year:y+1,calYear:f.month.split('-')[0],monthRange:f.month+' ~ '+l.month,principal:sum('principal'),interest:sum('interest'),tax:sum('tax'),insurance:sum('insurance'),hoa:sum('hoa'),pmi:sum('pmi'),other:sum('other'),total:sum('total'),endBalance:l.balance,avgPrincipal:sum('principal')/ms.length,avgInterest:sum('interest')/ms.length});
  }
  return out;
}

const fmtC0=v=>v.toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});

// ── Canvas utils ──────────────────────────────────────────────
function tc(){const dark=document.documentElement.getAttribute('data-theme')!=='light';return{grid:dark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)',axis:dark?'#475569':'#cbd5e1',text:dark?'#94a3b8':'#64748b'};}
function setupCV(id){
  const cv=document.getElementById(id);if(!cv)return null;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  let w=cv.getBoundingClientRect().width||cv.offsetWidth;if(!w&&cv.parentElement)w=cv.parentElement.clientWidth-40;if(!w)w=Math.max(window.innerWidth-80,200);
  let h=cv.getBoundingClientRect().height||cv.offsetHeight;if(!h)h=parseInt(getComputedStyle(cv).height)||220;
  cv.width=Math.round(w*dpr);cv.height=Math.round(h*dpr);const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);return{ctx,w,h,cv};
}
function setupScrollCV(id,pixW,pixH){
  const cv=document.getElementById(id);if(!cv)return null;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  cv.style.width=pixW+'px';cv.style.height=pixH+'px';cv.width=Math.round(pixW*dpr);cv.height=Math.round(pixH*dpr);
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);return{ctx,w:pixW,h:pixH,cv};
}
function niceMax(v){if(!v||v<=0)return 100;const raw=v*1.12;const exp=Math.floor(Math.log10(raw));const step=Math.pow(10,exp-1);return Math.ceil(raw/step)*step;}
function fmtY(v){if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(0)+'K';return'$'+Math.round(v);}
function drawAxes(ctx,pad,w,h,yMax,ticks,c){
  const ch=h-pad.t-pad.b;ctx.font='10px -apple-system,sans-serif';
  for(let i=0;i<=ticks;i++){const val=(yMax/ticks)*i,y=pad.t+ch-(val/yMax)*ch;ctx.strokeStyle=c.grid;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();ctx.fillStyle=c.text;ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText(fmtY(val),pad.l-6,y);}
  ctx.strokeStyle=c.axis;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,h-pad.b);ctx.lineTo(w-pad.r,h-pad.b);ctx.stroke();
}
function drawStackedBar(ctx,x,topY,ch,barW,yMax,data,palette){let by=topY+ch;SEGMENTS.forEach(seg=>{const v=data[seg]||0;if(v<=0)return;const bh=(v/yMax)*ch;by-=bh;ctx.fillStyle=palette[seg];ctx.fillRect(x,by,barW,bh);});}
function drawPolyline(ctx,data,key,pad,cw,ch,yMax,n,color){ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';ctx.beginPath();data.forEach((d,i)=>{const x=pad.l+i*cw/(n-1||1),y=pad.t+ch*(1-(d[key]||0)/yMax);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();}

// ── Chart A Yearly ────────────────────────────────────────────
function drawChartAYearly(yearly){
  const cv=document.getElementById('chartA');if(cv){cv.style.width='';cv.style.height='';}
  const c=setupCV('chartA');if(!c)return;
  const{ctx,w,h,cv:canvas}=c,col=tc(),pad={t:16,r:16,b:52,l:60},cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  ctx.clearRect(0,0,w,h);const yMax=niceMax(Math.max(...yearly.map(y=>y.total)));
  drawAxes(ctx,pad,w,h,yMax,5,col);
  const n=yearly.length,step=cw/n,barW=step*0.68,rects=[];
  yearly.forEach((yd,i)=>{
    const bx=pad.l+i*step+(step-barW)/2;drawStackedBar(ctx,bx,pad.t,ch,barW,yMax,yd,COLORS);
    const show=n<=15||i===0||(i+1)%5===0||i===n-1;
    if(show){ctx.fillStyle=col.text;ctx.textAlign='center';ctx.textBaseline='top';ctx.font='10px -apple-system,sans-serif';ctx.fillText(yd.calYear,bx+barW/2,h-pad.b+6);}
    rects.push({x:bx,w:barW,topY:pad.t,botY:pad.t+ch,yd});
  });
  canvas._rects=rects;
  setHover(canvas,e=>{const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;const hit=canvas._rects.find(b=>mx>=b.x&&mx<=b.x+b.w&&my>=b.topY&&my<=b.botY);if(hit)showTTBase(e.clientX,e.clientY,hit.yd,false);else hideTooltip();});
}
// ── Chart A Monthly ───────────────────────────────────────────
function drawChartAMonthly(schedule){
  const cv=document.getElementById('chartA');if(cv){cv.style.width='';cv.style.height='';}
  const c=setupCV('chartA');if(!c)return;
  const{ctx,w,h,cv:canvas}=c,col=tc(),pad={t:16,r:20,b:52,l:60},cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  const N=schedule.length,bw=Math.max(4,chartAView.barWidthPx);
  const totalW=N*bw,maxScroll=Math.max(0,totalW-cw);
  chartAView.scrollOffsetPx=Math.max(0,Math.min(chartAView.scrollOffsetPx,maxScroll));
  const scroll=chartAView.scrollOffsetPx;
  const startIdx=Math.max(0,Math.floor(scroll/bw));
  const endIdx=Math.min(N-1,Math.ceil((scroll+cw)/bw));
  const zl=document.getElementById('chartAZoomLabel');
  if(zl)zl.textContent=`~${Math.round(cw/bw)} ${t('zoom-mo')}`;

// ── Refi computation ──────────────────────────────────────────
function computeRefiSchedule(){
  if(!window._ld)return null;
  const{schedule}=window._ld,{effectiveMonthIdx,newApr,newTermYears}=refiState;
  if(!newApr||parseFloat(newApr)<=0)return null;
  const idx=Math.min(effectiveMonthIdx,schedule.length-1);
  const P=idx>0?schedule[idx-1].balance:(parseFloat(state.loanBalance)||0);
  if(P<=0)return null;
  const r=parseFloat(newApr)/100/12,n=newTermYears*12;
  let pPI;if(r===0)pPI=P/n;else{const pw=Math.pow(1+r,n);pPI=P*r*pw/(pw-1);}
  const out=[];
  for(let i=0;i<idx;i++)out.push({...schedule[i]});
  let bal=P,totInt=0;
  for(let i=0;i<n;i++){
    const bm=schedule[idx+i];
    let lbl;if(bm)lbl=bm.month;else{const prev=out[out.length-1],[py,pm]=prev.month.split('-').map(Number);const nm=pm%12+1,ny=nm===1?py+1:py;lbl=`${ny}-${String(nm).padStart(2,'0')}`;}
    const interest=bal*r;let principal=pPI-interest;if(principal>bal)principal=bal;bal=Math.max(bal-principal,0);totInt+=interest;
    const costs=bm||schedule[schedule.length-1];
    out.push({month:lbl,principal,interest,balance:bal,tax:costs.tax,insurance:costs.insurance,hoa:costs.hoa,pmi:costs.pmi,other:costs.other,total:principal+interest+costs.tax+costs.insurance+costs.hoa+costs.pmi+costs.other});
    if(bal<0.01)break;
  }
  return{refiSchedule:out,paymentPI:pPI,totalRefiInterest:totInt};
}
function computeRefiMetrics(baseSch,refiSch){
  const{effectiveMonthIdx,closingCost,horizonMonths}=refiState;
  const idx=effectiveMonthIdx,cost=closingCost||0;
  const bf=baseSch[idx],rf=refiSch[idx];
  const deltaMonthly=bf&&rf?rf.total-bf.total:0;
  const end=Math.min(idx+horizonMonths,Math.max(baseSch.length,refiSch.length));
  let bInt=0,rInt=0,cumSav=0,breakEven=null;
  for(let i=idx;i<end;i++){const bm=baseSch[i],rm=refiSch[i];if(!rm)break;if(bm)bInt+=bm.interest;rInt+=rm.interest;const sav=(bm?bm.total:0)-rm.total;cumSav+=sav;if(breakEven===null&&cumSav>=cost)breakEven=i-idx+1;}
  return{deltaMonthly,interestDiff:bInt-rInt,netSavings:cumSav-cost,breakEven};
}

  ctx.restore();
  canvas._rects=rects;
  setHover(canvas,e=>{const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;const hit=canvas._rects.find(b=>mx>=b.x&&mx<=b.x+b.w&&my>=b.topY&&my<=b.botY);if(hit)showTTOverlay(e.clientX,e.clientY,hit.label,hit.bd,hit.rd);else hideTooltip();});
  setTouch(canvas,dx=>{overlayView.scrollOffsetPx=Math.max(0,Math.min(maxScroll,overlayView.scrollOffsetPx-dx));drawOverlayMonthly(data);});
  setPanWheel(canvas,()=>overlayView.scrollOffsetPx,(v)=>{overlayView.scrollOffsetPx=Math.max(0,Math.min(maxScroll,v));},()=>drawOverlayMonthly(data));
}
function renderOverlayLegend(){
  const el=document.getElementById('legendOverlay');if(!el)return;
  const mk=p=>SEGMENTS.map(s=>`<div class="legend-item"><div class="legend-dot" style="background:${p[s]}"></div>${sl(s)}</div>`).join('');
  el.innerHTML=`<div class="legend-group-label">${t('legend-baseline')}</div><div style="display:flex;flex-wrap:wrap;gap:8px">${mk(COLORS)}</div><div class="legend-group-label">${t('legend-refi')}</div><div style="display:flex;flex-wrap:wrap;gap:8px">${mk(COLORS_REFI)}</div>`;
}

// ── Zoom helpers ──────────────────────────────────────────────
function onChartAZoom(bw){const cv=document.getElementById('chartA');const cw=Math.max(100,(cv?.getBoundingClientRect().width||400)-80);const oldBw=chartAView.barWidthPx||20;const centerIdx=(chartAView.scrollOffsetPx+cw/2)/oldBw;chartAView.barWidthPx=bw;const N=window._ld?.schedule.length||360;chartAView.scrollOffsetPx=Math.max(0,Math.min(Math.max(0,N*bw-cw),centerIdx*bw-cw/2));if(window._ld)drawChartAMonthly(window._ld.schedule);}
function onOverlayZoom(bw){const cv=document.getElementById('chartOverlay');const cw=Math.max(100,(cv?.getBoundingClientRect().width||400)-80);const oldBw=overlayView.barWidthPx||20;const centerIdx=(overlayView.scrollOffsetPx+cw/2)/oldBw;overlayView.barWidthPx=bw;const N=Math.max(window._lrd?.baseSch.length||0,window._lrd?.refiSch.length||0);overlayView.scrollOffsetPx=Math.max(0,Math.min(Math.max(0,N*bw-cw),centerIdx*bw-cw/2));if(window._lrd)renderOverlayChart(window._lrd);}

// ── Resize ────────────────────────────────────────────────────
let _rt;window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(()=>{if(window._ld)tryRenderCharts(window._ld,0);if(window._lrd)tryRenderOverlay(window._lrd,0);},150);});

init();
</script>
