<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mortgage Visualizer</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #263347;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #60a5fa;
      --accent2: #3b82f6;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --input-bg: #111827;
    }
    [data-theme="light"] {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface2: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #475569;
      --text-dim: #94a3b8;
      --accent: #2563eb;
      --accent2: #1d4ed8;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --input-bg: #f8fafc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.2);
    }
    .header-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.01em;
    }
    .theme-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .theme-btn:hover { background: var(--border); }

    /* ---- Layout ---- */
    .main {
      display: flex;
      min-height: calc(100vh - 53px);
    }
    .left-panel {
      width: 310px;
      min-width: 310px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 18px;
      overflow-y: auto;
      height: calc(100vh - 53px);
      position: sticky;
      top: 53px;
    }
    .right-panel {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      min-width: 0;
    }

    /* ---- Input sections ---- */
    .section { margin-bottom: 22px; }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .field-hint {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 3px;
    }
    input[type="number"],
    input[type="month"],
    select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input[type="range"] {
      width: 100%;
      margin-top: 5px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .field-row { display: flex; gap: 8px; align-items: flex-end; }
    .field-row .field { flex: 1; margin-bottom: 0; }

    /* ---- Toggle groups ---- */
    .toggle-group {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .toggle-btn {
      flex: 1;
      padding: 6px 4px;
      text-align: center;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .toggle-btn.active {
      background: var(--accent2);
      color: #fff;
    }
    .toggle-btn:not(.active):hover { background: var(--surface2); }

    /* ---- Summary cards ---- */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .card-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .card-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .card-value.highlight { color: var(--accent); }
    .card-sub { font-size: 10px; color: var(--text-dim); margin-top: 3px; }

    /* ---- Chart cards ---- */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 14px;
    }
    .chart-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    canvas { display: block; width: 100%; }
    #chartA { height: 300px; }
    #chartB { height: 220px; }
    #chartC { height: 220px; }

    /* ---- Legend ---- */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* ---- Table ---- */
    .table-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: auto;
      max-height: 440px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th {
      background: var(--surface2);
      padding: 9px 12px;
      text-align: right;
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    thead th:first-child { text-align: left; }
    tbody td {
      padding: 8px 12px;
      text-align: right;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      white-space: nowrap;
    }
    tbody td:first-child { text-align: left; font-weight: 500; color: var(--text-muted); }
    tbody tr:hover { background: var(--surface2); }
    tbody tr:last-child td { border-bottom: none; }
    .total-col { font-weight: 600; color: var(--accent) !important; }

    /* ---- Buttons ---- */
    .btn {
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-outline:hover { background: var(--surface2); color: var(--text); }

    /* ---- Tooltip ---- */
    #tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 9999;
      box-shadow: var(--shadow);
      min-width: 180px;
    }
    #tooltip.visible { opacity: 1; }
    .tt-title { font-weight: 700; margin-bottom: 7px; color: var(--text); font-size: 13px; }
    .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 3px;
      color: var(--text-muted);
    }
    .tt-row strong { color: var(--text); font-weight: 600; }
    .tt-divider { border-top: 1px solid var(--border); margin: 6px 0; }

    /* ---- Empty state ---- */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }
    .empty-icon { font-size: 48px; margin-bottom: 14px; }
    .empty-text { font-size: 15px; line-height: 1.6; }
    .empty-hint { font-size: 12px; margin-top: 8px; color: var(--text-dim); }

    /* ---- Mobile panel toggle ---- */
    .panel-toggle {
      display: none;
      width: 100%;
      background: none;
      border: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      padding: 0 0 14px 0;
      cursor: pointer;
      text-align: left;
      align-items: center;
      justify-content: space-between;
    }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ---- Responsive ---- */
    @media (max-width: 820px) {
      .main { flex-direction: column; }
      .left-panel {
        width: 100%;
        min-width: unset;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 16px;
      }
      .panel-toggle { display: flex; }
      .panel-content { display: none; }
      .panel-content.open { display: block; padding-top: 12px; }
      .right-panel { padding: 16px; }
      .chart-grid { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      #chartA { height: 240px; }
      #chartB, #chartC { height: 200px; }
    }
    @media (max-width: 480px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .card-value { font-size: 16px; }
    }
  </style>
</head>
<body>

<div id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div id="tt-body"></div>
</div>

<header class="header">
  <div class="header-title">Mortgage Visualizer</div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">Light Mode</button>
</header>

<div class="main">
  <!-- Left: Input Panel -->
  <div class="left-panel">
    <button class="panel-toggle" onclick="togglePanel()">
      <span>Parameters</span>
      <span id="panelArrow">&#9660;</span>
    </button>
    <div class="panel-content open" id="panelContent">

      <!-- Loan -->
      <div class="section">
        <div class="section-title">Loan</div>

        <div class="field">
          <label>Start Month</label>
          <input type="text" id="startMonth" placeholder="YYYY-MM  e.g. 2025-03" onchange="update()" oninput="update()">
        </div>

        <div class="field">
          <label>Loan Balance ($)</label>
          <input type="number" id="loanBalance" placeholder="e.g. 450000" min="0" step="1000" oninput="update()">
        </div>

        <div class="field">
          <label>Annual Interest Rate (%)</label>
          <input type="number" id="interestRate" placeholder="e.g. 6.5" min="0" max="30" step="0.05"
            oninput="document.getElementById('rateSlider').value=this.value||0; update()">
          <input type="range" id="rateSlider" min="0" max="15" step="0.05" value="6.5"
            oninput="document.getElementById('interestRate').value=parseFloat(this.value).toFixed(2); update()">
          <div class="field-hint">Per year (APR)</div>
        </div>

        <div class="field">
          <label>Loan Term</label>
          <div class="toggle-group" id="termGroup">
            <button class="toggle-btn" onclick="setTerm(15)">15 yr</button>
            <button class="toggle-btn" onclick="setTerm(20)">20 yr</button>
            <button class="toggle-btn" onclick="setTerm(25)">25 yr</button>
            <button class="toggle-btn active" onclick="setTerm(30)">30 yr</button>
          </div>
        </div>
      </div>

      <!-- Monthly Costs -->
      <div class="section">
        <div class="section-title">Monthly Costs</div>

        <div class="field">
          <label>Property Tax</label>
          <div class="toggle-group" style="margin-bottom:8px;">
            <button class="toggle-btn active" id="taxBtnA" onclick="setTaxMode('A')">Annual Amount</button>
            <button class="toggle-btn" id="taxBtnB" onclick="setTaxMode('B')">Rate x Value</button>
          </div>
          <div id="taxFieldsA">
            <input type="number" id="propertyTaxAnnual" placeholder="Annual tax ($) e.g. 6000" min="0" oninput="update()">
          </div>
          <div id="taxFieldsB" style="display:none;">
            <input type="number" id="homeValue" placeholder="Home value ($)" min="0" oninput="update()" style="margin-bottom:6px;">
            <input type="number" id="propertyTaxRate" placeholder="Tax rate (%) e.g. 1.2" min="0" max="10" step="0.01" oninput="update()">
          </div>
        </div>

        <div class="field">
          <label>Home Insurance (annual $)</label>
          <input type="number" id="homeInsuranceAnnual" placeholder="e.g. 1800" min="0" oninput="update()">
        </div>

        <div class="field-row">
          <div class="field">
            <label>HOA (mo. $)</label>
            <input type="number" id="hoaMonthly" placeholder="0" min="0" oninput="update()">
          </div>
          <div class="field">
            <label>PMI (mo. $)</label>
            <input type="number" id="pmiMonthly" placeholder="0" min="0" oninput="update()">
          </div>
        </div>

        <div class="field">
          <label>Other (monthly $)</label>
          <input type="number" id="otherMonthly" placeholder="0" min="0" oninput="update()">
        </div>
      </div>

    </div><!-- /panelContent -->
  </div><!-- /left-panel -->

  <!-- Right: Output Panel -->
  <div class="right-panel">
    <div id="output">
      <div class="empty-state">
        <div class="empty-icon">&#127968;</div>
        <div class="empty-text">Enter your loan balance and interest rate to see projections.</div>
        <div class="empty-hint">All costs are optional. Start with just Balance + Rate.</div>
      </div>
    </div>
  </div>
</div>

<script>
// =============================================================
// Config
// =============================================================
const COLORS = {
  principal:  '#3b82f6',
  interest:   '#f43f5e',
  tax:        '#f59e0b',
  insurance:  '#10b981',
  hoa:        '#8b5cf6',
  pmi:        '#f97316',
  other:      '#94a3b8',
};
const SEGMENTS = ['principal','interest','tax','insurance','hoa','pmi','other'];
const SEG_LABELS = {
  principal: 'Principal', interest: 'Interest', tax: 'Property Tax',
  insurance: 'Insurance', hoa: 'HOA', pmi: 'PMI', other: 'Other',
};

// =============================================================
// State
// =============================================================
let state = {
  startMonth: '', loanBalance: '', interestRate: '', termYears: 30,
  taxMode: 'A', propertyTaxAnnual: '', homeValue: '', propertyTaxRate: '',
  homeInsuranceAnnual: '', hoaMonthly: '', pmiMonthly: '', otherMonthly: '',
  viewMode: 'yearly', theme: 'dark',
};

// =============================================================
// Init
// =============================================================
function init() {
  const now = new Date();
  const curMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('startMonth').value = curMonth;
  state.startMonth = curMonth;

  try {
    const saved = JSON.parse(localStorage.getItem('mvis_state') || 'null');
    if (saved) {
      Object.assign(state, saved);
      restoreInputs();
    }
  } catch(e) {}

  document.documentElement.setAttribute('data-theme', state.theme);
  updateThemeBtn();
  setTerm(state.termYears, false);
  setTaxMode(state.taxMode, false);

  if (state.loanBalance && state.interestRate) update();
}

function restoreInputs() {
  const ids = ['startMonth','loanBalance','interestRate','propertyTaxAnnual',
               'homeValue','propertyTaxRate','homeInsuranceAnnual','hoaMonthly','pmiMonthly','otherMonthly'];
  ids.forEach(id => { if (state[id]) document.getElementById(id).value = state[id]; });
  if (state.interestRate) document.getElementById('rateSlider').value = parseFloat(state.interestRate) || 6.5;
}

// =============================================================
// UI helpers
// =============================================================
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  updateThemeBtn();
  saveState();
  if (window._lastData) renderCharts(window._lastData);
}
function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = state.theme === 'dark' ? 'Light Mode' : 'Dark Mode';
}
function togglePanel() {
  const c = document.getElementById('panelContent');
  const a = document.getElementById('panelArrow');
  c.classList.toggle('open');
  a.innerHTML = c.classList.contains('open') ? '&#9660;' : '&#9654;';
}
function setTerm(yr, doUpdate=true) {
  state.termYears = yr;
  const btns = document.querySelectorAll('#termGroup .toggle-btn');
  [15,20,25,30].forEach((v,i) => btns[i].classList.toggle('active', v===yr));
  if (doUpdate) update();
}
function setTaxMode(mode, doUpdate=true) {
  state.taxMode = mode;
  document.getElementById('taxBtnA').classList.toggle('active', mode==='A');
  document.getElementById('taxBtnB').classList.toggle('active', mode==='B');
  document.getElementById('taxFieldsA').style.display = mode==='A' ? '' : 'none';
  document.getElementById('taxFieldsB').style.display = mode==='B' ? '' : 'none';
  if (doUpdate) update();
}
function readState() {
  const ids = ['startMonth','loanBalance','interestRate','propertyTaxAnnual',
               'homeValue','propertyTaxRate','homeInsuranceAnnual','hoaMonthly','pmiMonthly','otherMonthly'];
  ids.forEach(id => { state[id] = document.getElementById(id).value; });
}
function saveState() { try { localStorage.setItem('mvis_state', JSON.stringify(state)); } catch(e){} }

// =============================================================
// Computation
// =============================================================
function computeSchedule() {
  const P   = parseFloat(state.loanBalance)   || 0;
  const APR = parseFloat(state.interestRate)  || 0;
  if (P <= 0) return null;

  const n = state.termYears * 12;
  const r = APR / 100 / 12;

  let paymentPI;
  if (r === 0) {
    paymentPI = P / n;
  } else {
    const pow = Math.pow(1+r, n);
    paymentPI = P * r * pow / (pow - 1);
  }

  let taxMo;
  if (state.taxMode === 'A') {
    taxMo = (parseFloat(state.propertyTaxAnnual) || 0) / 12;
  } else {
    taxMo = (parseFloat(state.homeValue) || 0) * (parseFloat(state.propertyTaxRate) || 0) / 100 / 12;
  }
  const insMo  = (parseFloat(state.homeInsuranceAnnual) || 0) / 12;
  const hoaMo  =  parseFloat(state.hoaMonthly)  || 0;
  const pmiMo  =  parseFloat(state.pmiMonthly)  || 0;
  const othMo  =  parseFloat(state.otherMonthly)|| 0;

  const startStr = state.startMonth || (() => {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  })();
  const [sy, sm] = startStr.split('-').map(Number);

  const schedule = [];
  let balance = P, totalInterest = 0;

  for (let i = 0; i < n; i++) {
    const mo    = sm - 1 + i;
    const year  = sy + Math.floor(mo / 12);
    const month = (mo % 12) + 1;
    const label = `${year}-${String(month).padStart(2,'0')}`;

    const interest  = balance * r;
    let   principal = paymentPI - interest;
    if (principal > balance) principal = balance;
    balance = Math.max(balance - principal, 0);
    totalInterest += interest;

    const total = principal + interest + taxMo + insMo + hoaMo + pmiMo + othMo;
    schedule.push({ month: label, principal, interest, balance,
                    tax: taxMo, insurance: insMo, hoa: hoaMo, pmi: pmiMo, other: othMo, total });
    if (balance < 0.01) break;
  }

  return { schedule, paymentPI, taxMo, insMo, hoaMo, pmiMo, othMo, totalInterest };
}

function aggregateYearly(schedule) {
  const yearly = [];
  for (let y = 0; y < Math.ceil(schedule.length / 12); y++) {
    const months = schedule.slice(y*12, (y+1)*12);
    const sum = k => months.reduce((a, m) => a + m[k], 0);
    const first = months[0], last = months[months.length-1];
    yearly.push({
      year:         y + 1,
      calYear:      first.month.split('-')[0],
      monthRange:   first.month + ' ~ ' + last.month,
      principal:    sum('principal'),
      interest:     sum('interest'),
      tax:          sum('tax'),
      insurance:    sum('insurance'),
      hoa:          sum('hoa'),
      pmi:          sum('pmi'),
      other:        sum('other'),
      total:        sum('total'),
      endBalance:   last.balance,
      avgPrincipal: sum('principal') / months.length,
      avgInterest:  sum('interest')  / months.length,
    });
  }
  return yearly;
}

// =============================================================
// Main update
// =============================================================
let _debounce;
function update() {
  clearTimeout(_debounce);
  _debounce = setTimeout(_doUpdate, 60);
}

function _doUpdate() {
  readState();
  saveState();

  const result = computeSchedule();
  if (!result) {
    document.getElementById('output').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#127968;</div>
        <div class="empty-text">Enter your loan balance and interest rate to see projections.</div>
        <div class="empty-hint">All costs are optional. Start with just Balance + Rate.</div>
      </div>`;
    return;
  }

  const { schedule, paymentPI, taxMo, insMo, hoaMo, pmiMo, othMo, totalInterest } = result;
  const yearly = aggregateYearly(schedule);
  const totalMo = paymentPI + taxMo + insMo + hoaMo + pmiMo + othMo;
  const payoffDate = schedule[schedule.length-1].month;
  window._lastData = { schedule, yearly };

  document.getElementById('output').innerHTML = `
    <div class="summary-grid" id="summaryGrid"></div>

    <div class="chart-card">
      <div class="chart-title">Monthly Outflow by Year &mdash; Stacked</div>
      <canvas id="chartA"></canvas>
      <div class="legend" id="legendA"></div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">Principal vs Interest (monthly avg / year)</div>
        <canvas id="chartB"></canvas>
        <div class="legend" id="legendB"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Remaining Balance</div>
        <canvas id="chartC"></canvas>
      </div>
    </div>

    <div class="table-controls">
      <div class="toggle-group" style="width:auto;">
        <button class="toggle-btn ${state.viewMode==='yearly'?'active':''}" onclick="setViewMode('yearly')">By Year</button>
        <button class="toggle-btn ${state.viewMode==='monthly'?'active':''}" onclick="setViewMode('monthly')">By Month</button>
      </div>
      <button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
    </div>
    <div class="table-wrapper">
      <table id="schedTable"></table>
    </div>
  `;

  renderSummary({ paymentPI, taxMo, insMo, hoaMo, pmiMo, othMo, totalMo, totalInterest, payoffDate });
  renderTable(schedule, yearly);

  // Charts: use a retry loop so iOS Safari has enough time to lay out the DOM.
  tryRenderCharts({ schedule, yearly }, 0);
}

function tryRenderCharts(data, attempt) {
  var canvas = document.getElementById('chartA');
  if (!canvas) return;
  var w = canvas.getBoundingClientRect().width || canvas.offsetWidth
          || (canvas.parentElement ? canvas.parentElement.clientWidth - 40 : 0);
  if (!w && attempt < 15) {
    setTimeout(function() { tryRenderCharts(data, attempt + 1); }, 80);
    return;
  }
  renderCharts(data);
}

// =============================================================
// Summary
// =============================================================
const fmtC  = v => v.toLocaleString('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2,maximumFractionDigits:2});
const fmtC0 = v => v.toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});

function renderSummary({ paymentPI, taxMo, insMo, hoaMo, pmiMo, othMo, totalMo, totalInterest, payoffDate }) {
  const othTotal = hoaMo + pmiMo + othMo;
  const cards = [
    { label:'Monthly P&I',     value: fmtC(paymentPI), sub:'principal + interest' },
    { label:'Monthly Tax',     value: fmtC(taxMo),     sub:'property tax' },
    { label:'Monthly Ins.',    value: fmtC(insMo),      sub:'home insurance' },
    { label:'HOA / PMI / Other', value: fmtC(othTotal), sub:'monthly extras' },
    { label:'Monthly Total',   value: fmtC(totalMo),   sub:'all-in payment', highlight: true },
    { label:'Total Interest',  value: fmtC0(totalInterest), sub:'over loan life' },
    { label:'Payoff Date',     value: payoffDate,       sub:'final payment month' },
  ];
  document.getElementById('summaryGrid').innerHTML = cards.map(c => `
    <div class="card">
      <div class="card-label">${c.label}</div>
      <div class="card-value${c.highlight?' highlight':''}">${c.value}</div>
      <div class="card-sub">${c.sub}</div>
    </div>`).join('');
}

// =============================================================
// Charts
// =============================================================
function tc() {
  const dark = document.documentElement.getAttribute('data-theme') !== 'light';
  return {
    grid:  dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)',
    axis:  dark ? '#475569' : '#cbd5e1',
    text:  dark ? '#94a3b8' : '#64748b',
    bg:    dark ? '#1e293b' : '#ffffff',
  };
}

function setupCanvas(id) {
  const canvas = document.getElementById(id);
  if (!canvas) return null;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);

  // getBoundingClientRect may return 0 right after DOM insertion on iOS —
  // fall through several fallbacks to get a real pixel width.
  let w = canvas.getBoundingClientRect().width || canvas.offsetWidth;
  if (!w && canvas.parentElement) w = canvas.parentElement.clientWidth - 40;
  if (!w) w = Math.max(window.innerWidth - 80, 200);

  let h = canvas.getBoundingClientRect().height || canvas.offsetHeight;
  if (!h) h = parseInt(getComputedStyle(canvas).height) || 220;

  canvas.width  = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return { ctx, w, h, canvas };
}

function niceMax(val) {
  if (!val || val <= 0) return 100;
  const raw = val * 1.08;
  const exp = Math.floor(Math.log10(raw));
  const base = Math.pow(10, exp);
  const f = raw / base;
  const nice = f <= 1.5 ? 1.5 : f <= 2 ? 2 : f <= 3 ? 3 : f <= 5 ? 5 : 10;
  return nice * base;
}

function fmtY(v) {
  if (v >= 1e6) return '$'+(v/1e6).toFixed(1)+'M';
  if (v >= 1e3) return '$'+(v/1e3).toFixed(0)+'K';
  return '$'+Math.round(v);
}

function drawAxes(ctx, pad, w, h, yMax, yTicks, colors) {
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;

  // Y grid + labels
  ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
  for (let i = 0; i <= yTicks; i++) {
    const val = (yMax / yTicks) * i;
    const y   = pad.t + ch - (val / yMax) * ch;

    ctx.strokeStyle = colors.grid;
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(pad.l, y);
    ctx.lineTo(w - pad.r, y);
    ctx.stroke();

    ctx.fillStyle   = colors.text;
    ctx.textAlign   = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(fmtY(val), pad.l - 6, y);
  }

  // Axes
  ctx.strokeStyle = colors.axis;
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(pad.l, pad.t);
  ctx.lineTo(pad.l, h - pad.b);
  ctx.lineTo(w - pad.r, h - pad.b);
  ctx.stroke();
}

function renderCharts(data) {
  drawChartA(data.yearly);
  drawChartB(data.yearly);
  drawChartC(data.yearly);
  renderLegends();
}

// ---- Chart A: Stacked Bar ----
function drawChartA(yearly) {
  const c = setupCanvas('chartA');
  if (!c) return;
  const { ctx, w, h, canvas } = c;
  const colors = tc();
  const pad = { t:16, r:16, b:52, l:60 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;

  ctx.clearRect(0, 0, w, h);

  const maxTot = Math.max(...yearly.map(y => y.total));
  const yMax   = niceMax(maxTot);

  drawAxes(ctx, pad, w, h, yMax, 5, colors);

  const n    = yearly.length;
  const step = cw / n;
  const barW = step * 0.68;

  const barRects = [];

  yearly.forEach((yd, i) => {
    const bx = pad.l + i * step + (step - barW) / 2;
    let   by = pad.t + ch;

    SEGMENTS.forEach(seg => {
      const val = yd[seg] || 0;
      if (val <= 0) return;
      const bh = (val / yMax) * ch;
      by -= bh;
      ctx.fillStyle = COLORS[seg];
      ctx.fillRect(bx, by, barW, bh);
    });

    // X label
    const show = n <= 15 || i === 0 || (i+1) % 5 === 0 || i === n-1;
    if (show) {
      ctx.fillStyle    = colors.text;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';
      ctx.font = '10px -apple-system, sans-serif';
      ctx.fillText(yd.calYear, bx + barW/2, h - pad.b + 6);
    }

    barRects.push({ x: bx, w: barW, topY: pad.t, botY: pad.t+ch, yd });
  });

  canvas._bars = barRects;
  canvas._pad  = pad;

  if (!canvas._hover) {
    canvas._hover = true;
    canvas.addEventListener('mousemove', e => {
      const r  = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left;
      const my = e.clientY - r.top;
      const hit = (canvas._bars||[]).find(b => mx>=b.x && mx<=b.x+b.w && my>=b.topY && my<=b.botY);
      if (hit) showTooltipA(e.clientX, e.clientY, hit.yd);
      else hideTooltip();
    });
    canvas.addEventListener('mouseleave', hideTooltip);
  }
}

function showTooltipA(mx, my, yd) {
  document.getElementById('tt-title').textContent = `Year ${yd.year}  (${yd.monthRange})`;
  let html = '';
  SEGMENTS.forEach(seg => {
    const v = yd[seg] || 0;
    if (v <= 0) return;
    html += `<div class="tt-row">
      <span style="color:${COLORS[seg]}">&#9632; ${SEG_LABELS[seg]}</span>
      <strong>${fmtC0(v)}</strong></div>`;
  });
  html += `<div class="tt-divider"></div>
    <div class="tt-row"><span>Total</span><strong>${fmtC0(yd.total)}</strong></div>`;
  document.getElementById('tt-body').innerHTML = html;
  placeTooltip(mx, my);
  document.getElementById('tooltip').classList.add('visible');
}

function placeTooltip(mx, my) {
  const tt = document.getElementById('tooltip');
  const tw = 220, th = 200, margin = 14;
  let left = mx + margin, top = my + margin;
  if (left + tw > window.innerWidth)  left = mx - tw - margin;
  if (top  + th > window.innerHeight) top  = my - th - margin;
  tt.style.left = left + 'px';
  tt.style.top  = top  + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// ---- Chart B: Principal vs Interest lines ----
function drawChartB(yearly) {
  const c = setupCanvas('chartB');
  if (!c) return;
  const { ctx, w, h } = c;
  const colors = tc();
  const pad = { t:16, r:16, b:36, l:60 };
  const cw  = w - pad.l - pad.r;
  const ch  = h - pad.t - pad.b;

  ctx.clearRect(0, 0, w, h);

  const maxVal = Math.max(...yearly.map(y => Math.max(y.avgPrincipal, y.avgInterest)));
  const yMax   = niceMax(maxVal);

  drawAxes(ctx, pad, w, h, yMax, 4, colors);

  const n = yearly.length;

  drawPolyline(ctx, yearly, 'avgPrincipal', pad, cw, ch, yMax, n, COLORS.principal);
  drawPolyline(ctx, yearly, 'avgInterest',  pad, cw, ch, yMax, n, COLORS.interest);

  // X labels
  ctx.fillStyle    = colors.text;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  ctx.font = '10px -apple-system, sans-serif';
  yearly.forEach((yd, i) => {
    const show = n <= 10 || i === 0 || (i+1) % 5 === 0 || i === n-1;
    if (show) ctx.fillText(yd.calYear, pad.l + i * cw/(n-1||1), h - pad.b + 6);
  });
}

function drawPolyline(ctx, yearly, key, pad, cw, ch, yMax, n, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth   = 2.5;
  ctx.lineJoin    = 'round';
  ctx.lineCap     = 'round';
  ctx.beginPath();
  yearly.forEach((yd, i) => {
    const x = pad.l + i * cw / (n-1||1);
    const y = pad.t + ch * (1 - (yd[key]||0) / yMax);
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
}

// ---- Chart C: Remaining Balance ----
function drawChartC(yearly) {
  const c = setupCanvas('chartC');
  if (!c) return;
  const { ctx, w, h } = c;
  const colors = tc();
  const pad = { t:16, r:16, b:36, l:60 };
  const cw  = w - pad.l - pad.r;
  const ch  = h - pad.t - pad.b;

  ctx.clearRect(0, 0, w, h);

  const initBal = parseFloat(state.loanBalance) || 0;
  const yMax    = niceMax(initBal || 1);
  const n       = yearly.length;

  drawAxes(ctx, pad, w, h, yMax, 4, colors);

  // Fill area
  ctx.fillStyle = COLORS.principal + '22';
  ctx.beginPath();
  ctx.moveTo(pad.l, pad.t + ch);
  yearly.forEach((yd, i) => {
    const x = pad.l + i * cw/(n-1||1);
    const y = pad.t + ch * (1 - yd.endBalance / yMax);
    ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.l + (n-1)*cw/(n-1||1), pad.t + ch);
  ctx.closePath();
  ctx.fill();

  drawPolyline(ctx, yearly, 'endBalance', pad, cw, ch, yMax, n, COLORS.principal);

  // X labels
  ctx.fillStyle    = colors.text;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  ctx.font = '10px -apple-system, sans-serif';
  yearly.forEach((yd, i) => {
    const show = n <= 10 || i === 0 || (i+1) % 5 === 0 || i === n-1;
    if (show) ctx.fillText(yd.calYear, pad.l + i * cw/(n-1||1), h - pad.b + 6);
  });
}

function renderLegends() {
  const la = document.getElementById('legendA');
  if (la) la.innerHTML = SEGMENTS.map(s =>
    `<div class="legend-item"><div class="legend-dot" style="background:${COLORS[s]}"></div>${SEG_LABELS[s]}</div>`
  ).join('');

  const lb = document.getElementById('legendB');
  if (lb) lb.innerHTML =
    `<div class="legend-item"><div class="legend-dot" style="background:${COLORS.principal}"></div>Principal</div>
     <div class="legend-item"><div class="legend-dot" style="background:${COLORS.interest}"></div>Interest</div>`;
}

// =============================================================
// Table
// =============================================================
function setViewMode(mode) {
  state.viewMode = mode;
  saveState();
  if (!window._lastData) return;
  const { schedule, yearly } = window._lastData;
  renderTable(schedule, yearly);
  document.querySelectorAll('.table-controls .toggle-btn').forEach((b, i) => {
    b.classList.toggle('active', (i===0 && mode==='yearly') || (i===1 && mode==='monthly'));
  });
}

function renderTable(schedule, yearly) {
  const tbl = document.getElementById('schedTable');
  if (!tbl) return;

  const headers = ['Period','Principal','Interest','Balance','Tax','Insurance','HOA','PMI','Other','Total'];
  const th = `<thead><tr>${headers.map(h =>
    `<th>${h}</th>`).join('')}</tr></thead>`;

  let rows = '';
  if (state.viewMode === 'yearly') {
    yearly.forEach(y => {
      rows += `<tr>
        <td>${y.calYear}</td>
        <td>${fmtC(y.principal)}</td>
        <td>${fmtC(y.interest)}</td>
        <td>${fmtC(y.endBalance)}</td>
        <td>${fmtC(y.tax)}</td>
        <td>${fmtC(y.insurance)}</td>
        <td>${fmtC(y.hoa)}</td>
        <td>${fmtC(y.pmi)}</td>
        <td>${fmtC(y.other)}</td>
        <td class="total-col">${fmtC(y.total)}</td>
      </tr>`;
    });
  } else {
    schedule.forEach(m => {
      rows += `<tr>
        <td>${m.month}</td>
        <td>${fmtC(m.principal)}</td>
        <td>${fmtC(m.interest)}</td>
        <td>${fmtC(m.balance)}</td>
        <td>${fmtC(m.tax)}</td>
        <td>${fmtC(m.insurance)}</td>
        <td>${fmtC(m.hoa)}</td>
        <td>${fmtC(m.pmi)}</td>
        <td>${fmtC(m.other)}</td>
        <td class="total-col">${fmtC(m.total)}</td>
      </tr>`;
    });
  }
  tbl.innerHTML = th + `<tbody>${rows}</tbody>`;
}

// =============================================================
// CSV Export
// =============================================================
function exportCSV() {
  if (!window._lastData) return;
  const { schedule } = window._lastData;
  const hdr = 'Month,Principal,Interest,Balance,Tax,Insurance,HOA,PMI,Other,Total';
  const rows = schedule.map(m =>
    [m.month, m.principal, m.interest, m.balance,
     m.tax, m.insurance, m.hoa, m.pmi, m.other, m.total]
    .map(v => typeof v==='number' ? v.toFixed(2) : v).join(',')
  );
  const csv  = [hdr, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'mortgage_schedule.csv'; a.click();
  URL.revokeObjectURL(url);
}

// =============================================================
// Resize
// =============================================================
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if (window._lastData) tryRenderCharts(window._lastData, 0);
  }, 150);
});

// =============================================================
// Go
// =============================================================
init();
</script>
